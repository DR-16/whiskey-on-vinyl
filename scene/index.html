<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>黑胶上的威士忌 · 空间 3D 场景</title>
  <style>
    html, body {
      margin: 0; padding: 0; background: #050309; color: #E8DDF0;
      font-family: "Noto Serif SC", "PingFang SC", serif;
      overflow: hidden;
      height: 100vh; width: 100vw;
    }
    canvas { display: block; }
    .hud {
      position: fixed; top: 16px; left: 16px;
      background: rgba(14,7,22,0.7);
      border: 1px solid rgba(184,160,216,0.18);
      padding: 14px 18px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 10;
      font-size: 13px;
      letter-spacing: 0.06em;
    }
    .hud h1 {
      margin: 0 0 8px;
      font-size: 14px; font-weight: 400;
      color: #B8A0D8; letter-spacing: 0.18em;
    }
    .views { display: flex; flex-wrap: wrap; gap: 6px; }
    .views button {
      background: transparent;
      color: #E8DDF0;
      border: 1px solid rgba(184,160,216,0.25);
      padding: 6px 12px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 0.12em;
      transition: all .25s;
    }
    .views button:hover, .views button.on {
      border-color: #C89B6C;
      background: rgba(200,155,108,0.15);
    }
    .info {
      position: fixed; bottom: 16px; left: 16px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: #C4B5D4;
      letter-spacing: 0.15em;
      background: rgba(14,7,22,0.5);
      padding: 8px 12px;
      border: 1px solid rgba(184,160,216,0.15);
      z-index: 10;
    }
  </style>
</head>
<body>

<div class="hud">
  <h1>黑胶上的威士忌 · 空间场景</h1>
  <div class="views">
    <button data-view="topdown" class="on">俯瞰平面</button>
    <button data-view="hero">主视图</button>
    <button data-view="entrance">入口</button>
    <button data-view="bar">吧台</button>
    <button data-view="vip">VIP</button>
    <button data-view="hall">主厅</button>
  </div>
</div>
<div class="info">DRAG · ORBIT &nbsp;|&nbsp; SCROLL · ZOOM</div>

<canvas id="scene"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// =================================================================
// CONSTANTS — room dimensions, matching reference proportions
// =================================================================
const W = 9.5;        // width  (x: -4.75 .. +4.75)
const D = 12.5;       // depth  (z: 0 .. 12.5; entrance at z=0, bar at z=12.5)
const H = 3.0;        // height

// =================================================================
// SCENE / CAMERA / RENDERER
// =================================================================
const canvas = document.getElementById('scene');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050309);
scene.fog = new THREE.FogExp2(0x09060f, 0.038);

const aspect = window.innerWidth / window.innerHeight;
const persCam = new THREE.PerspectiveCamera(50, aspect, 0.05, 100);
persCam.position.set(0, 1.6, 1.5);

// Orthographic top-down camera (for the "ground-truth plan view" hero shot)
const orthoSize = 7.5;
const orthoCam = new THREE.OrthographicCamera(
  -orthoSize * aspect, orthoSize * aspect,
   orthoSize, -orthoSize,
   0.1, 60
);
orthoCam.position.set(0, 20, D/2);
// world +z (bar end) should appear at TOP of screen, world -z (entrance) at BOTTOM
orthoCam.up.set(0, 0, 1);
orthoCam.lookAt(0, 0, D/2);

let activeCam = persCam;

const renderer = new THREE.WebGLRenderer({
  canvas, antialias: true,
  powerPreference: 'high-performance',
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const controls = new OrbitControls(persCam, canvas);
controls.target.set(0, 1.0, 7);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.maxPolarAngle = Math.PI * 0.495;
controls.minDistance = 0.6;
controls.maxDistance = 20;

// =================================================================
// MATERIALS — palette
// =================================================================
const MAT = {
  floorWood: new THREE.MeshStandardMaterial({
    color: 0x251612, roughness: 0.78, metalness: 0.05,
  }),
  floorVip: new THREE.MeshStandardMaterial({
    color: 0x1a0d18, roughness: 0.55, metalness: 0.08,
    emissive: 0x0a050d, emissiveIntensity: 0.4,
  }),
  floorEntry: new THREE.MeshStandardMaterial({
    color: 0x1d100c, roughness: 0.7, metalness: 0.05,
  }),
  wall: new THREE.MeshStandardMaterial({
    color: 0x100a18, roughness: 0.92, metalness: 0.0,
  }),
  wallDark: new THREE.MeshStandardMaterial({
    color: 0x0a0712, roughness: 0.95, metalness: 0.0,
  }),
  ceil: new THREE.MeshStandardMaterial({
    color: 0x070410, roughness: 0.98, metalness: 0.0,
  }),
  leatherWarm: new THREE.MeshStandardMaterial({
    color: 0x6b3a26, roughness: 0.55, metalness: 0.0,
    emissive: 0x1a0a04, emissiveIntensity: 0.25,
  }),
  leatherDeep: new THREE.MeshStandardMaterial({
    color: 0x4a2418, roughness: 0.55, metalness: 0.0,
    emissive: 0x180704, emissiveIntensity: 0.25,
  }),
  velvetVip: new THREE.MeshStandardMaterial({
    color: 0x4a2840, roughness: 0.7, metalness: 0.0,
    emissive: 0x1a0e1a, emissiveIntensity: 0.4,
  }),
  canvasFabric: new THREE.MeshStandardMaterial({
    color: 0x383040, roughness: 0.85, metalness: 0.0,
  }),
  woodDark: new THREE.MeshStandardMaterial({
    color: 0x1a0e08, roughness: 0.5, metalness: 0.25,
  }),
  marble: new THREE.MeshStandardMaterial({
    color: 0x12080a, roughness: 0.15, metalness: 0.55,
  }),
  copper: new THREE.MeshStandardMaterial({
    color: 0xC89B6C, roughness: 0.3, metalness: 0.75,
    emissive: 0x4a2810, emissiveIntensity: 0.45,
  }),
  copperGlow: new THREE.MeshBasicMaterial({
    color: 0xC89B6C, transparent: true, opacity: 0.55,
  }),
  lavenderCove: new THREE.MeshBasicMaterial({
    color: 0x9c7fd8, transparent: true, opacity: 0.75,
  }),
  warmBulb: new THREE.MeshBasicMaterial({ color: 0xffd09a }),
  glassAmber: new THREE.MeshStandardMaterial({
    color: 0x6b3a14, roughness: 0.12, metalness: 0.2,
    transparent: true, opacity: 0.78,
    emissive: 0x3a1a06, emissiveIntensity: 0.55,
  }),
  glassClear: new THREE.MeshStandardMaterial({
    color: 0x382820, roughness: 0.1, metalness: 0.15,
    transparent: true, opacity: 0.65,
    emissive: 0x4a3a26, emissiveIntensity: 0.4,
  }),
};

// =================================================================
// FLOOR (with subtle plank/parquet pattern as repeating dark grooves)
// =================================================================
// Main floor
const floor = new THREE.Mesh(new THREE.PlaneGeometry(W, D), MAT.floorWood);
floor.rotation.x = -Math.PI / 2;
floor.position.set(0, 0, D / 2);
floor.receiveShadow = true;
scene.add(floor);

// Floor plank grooves (lines on floor surface)
function addPlankGrooves() {
  const grooveMat = new THREE.MeshBasicMaterial({
    color: 0x0c0508, transparent: true, opacity: 0.6,
  });
  // Long grooves running along x-axis (parallel planks)
  for (let z = 0.4; z < D; z += 0.4) {
    const line = new THREE.Mesh(new THREE.PlaneGeometry(W, 0.012), grooveMat);
    line.rotation.x = -Math.PI/2;
    line.position.set(0, 0.005, z);
    scene.add(line);
  }
  // Cross seams at random intervals
  for (let z = 0.4; z < D; z += 0.4) {
    let x = -W/2 + 0.5 + Math.random() * 1.5;
    while (x < W/2) {
      const seam = new THREE.Mesh(new THREE.PlaneGeometry(0.012, 0.4), grooveMat);
      seam.rotation.x = -Math.PI/2;
      seam.position.set(x, 0.006, z - 0.2);
      scene.add(seam);
      x += 1.4 + Math.random() * 1.0;
    }
  }
}
addPlankGrooves();

// VIP floor patch (deeper purple-tinted wood) — lower center
const vipFloor = new THREE.Mesh(new THREE.PlaneGeometry(5.5, 2.2), MAT.floorVip);
vipFloor.rotation.x = -Math.PI / 2;
vipFloor.position.set(0, 0.008, 2.6);
vipFloor.receiveShadow = true;
scene.add(vipFloor);

// Entrance floor patch (slightly different, warm)
const entryFloor = new THREE.Mesh(new THREE.PlaneGeometry(3.0, 1.6), MAT.floorEntry);
entryFloor.rotation.x = -Math.PI / 2;
entryFloor.position.set(-2.8, 0.008, 0.85);
entryFloor.receiveShadow = true;
scene.add(entryFloor);

// =================================================================
// WALLS — outer rectangle
// =================================================================
function makeWall(w, h, mat) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  m.receiveShadow = true;
  return m;
}
// back (z = D)
const wBack = makeWall(W, H, MAT.wall);
wBack.position.set(0, H/2, D);
wBack.rotation.y = Math.PI;
scene.add(wBack);
// front (z = 0)
const wFront = makeWall(W, H, MAT.wall);
wFront.position.set(0, H/2, 0);
scene.add(wFront);
// left (x = -W/2)
const wLeft = makeWall(D, H, MAT.wall);
wLeft.position.set(-W/2, H/2, D/2);
wLeft.rotation.y = Math.PI / 2;
scene.add(wLeft);
// right (x = W/2)
const wRight = makeWall(D, H, MAT.wall);
wRight.position.set(W/2, H/2, D/2);
wRight.rotation.y = -Math.PI / 2;
scene.add(wRight);

// Ceiling
const ceil = new THREE.Mesh(new THREE.PlaneGeometry(W, D), MAT.ceil);
ceil.rotation.x = Math.PI / 2;
ceil.position.set(0, H, D / 2);
scene.add(ceil);
ceil.userData.hideInTopdown = true;

// =================================================================
// PERIMETER COVE LIGHT STRIPS (lavender) — along all 4 walls
// =================================================================
function addCoveStrip(w, position, rotationY) {
  const strip = new THREE.Mesh(new THREE.PlaneGeometry(w, 0.06), MAT.lavenderCove);
  strip.position.copy(position);
  strip.rotation.y = rotationY;
  strip.userData.hideInTopdown = true;
  scene.add(strip);
  // back glow plane on wall to fake bloom
  const glow = new THREE.Mesh(
    new THREE.PlaneGeometry(w, 0.6),
    new THREE.MeshBasicMaterial({
      color: 0x6b4a8c, transparent: true, opacity: 0.18, blending: THREE.AdditiveBlending,
    })
  );
  glow.position.copy(position);
  glow.position.y -= 0.25;
  glow.rotation.y = rotationY;
  glow.userData.hideInTopdown = true;
  scene.add(glow);
}
addCoveStrip(W - 0.3, new THREE.Vector3(0, H - 0.28, 0.02), 0);
addCoveStrip(W - 0.3, new THREE.Vector3(0, H - 0.28, D - 0.02), Math.PI);
addCoveStrip(D - 0.3, new THREE.Vector3(-W/2 + 0.02, H - 0.28, D/2), Math.PI/2);
addCoveStrip(D - 0.3, new THREE.Vector3(W/2 - 0.02, H - 0.28, D/2), -Math.PI/2);

// =================================================================
// CEILING VINYL — large dark disc with copper clock hands
// =================================================================
const discGroup = new THREE.Group();
discGroup.position.set(0, H - 0.32, 6.5);
scene.add(discGroup);
discGroup.userData.hideInTopdown = true;

const disc = new THREE.Mesh(
  new THREE.CylinderGeometry(2.4, 2.4, 0.08, 96),
  new THREE.MeshStandardMaterial({
    color: 0x0e081a, roughness: 0.4, metalness: 0.45,
    emissive: 0x2a1a48, emissiveIntensity: 0.55,
  })
);
discGroup.add(disc);

// concentric grooves
const grooveRingMat = new THREE.MeshBasicMaterial({
  color: 0x6b4a8c, transparent: true, opacity: 0.45,
});
for (let r = 0.7; r < 2.35; r += 0.07) {
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(r, r + 0.005, 96),
    grooveRingMat
  );
  ring.rotation.x = Math.PI/2;
  ring.position.y = -0.041;
  discGroup.add(ring);
}
// center label
const centerLabel = new THREE.Mesh(
  new THREE.CylinderGeometry(0.42, 0.42, 0.083, 32),
  MAT.copper
);
discGroup.add(centerLabel);

// clock hands
const handHour = new THREE.Mesh(
  new THREE.BoxGeometry(0.09, 0.025, 1.0),
  new THREE.MeshStandardMaterial({
    color: 0xC89B6C, roughness: 0.3, metalness: 0.75,
    emissive: 0x4a2e10, emissiveIntensity: 0.7,
  })
);
handHour.position.set(0.28, -0.05, 0.4);
handHour.rotation.y = -0.7;
discGroup.add(handHour);

const handMin = new THREE.Mesh(
  new THREE.BoxGeometry(0.05, 0.025, 1.5),
  new THREE.MeshStandardMaterial({
    color: 0xd2b894, roughness: 0.45, metalness: 0.4,
    emissive: 0x3a2e1a, emissiveIntensity: 0.55,
  })
);
handMin.position.set(0.05, -0.05, 0.7);
handMin.rotation.y = -0.1;
discGroup.add(handMin);

// disc emits a soft purple light to the room
const discLight = new THREE.PointLight(0x9c7fd8, 1.8, 14, 1.6);
discLight.position.set(0, H - 0.5, 6.5);
scene.add(discLight);

// =================================================================
// BAR — arc shape at the back (z = 9.5 to 12), bartender side INSIDE the arc
// Bar opens TOWARD the room (facing -z)
// =================================================================
const barGroup = new THREE.Group();
barGroup.position.set(0, 0, 11.0);
scene.add(barGroup);

// Bar arc geometry — extruded shape
const barOuter = 3.8, barInner = 3.0, barHeight = 1.05;
const barShape = new THREE.Shape();
barShape.absarc(0, 0, barOuter, Math.PI, 2*Math.PI, false);
barShape.lineTo(barInner, 0);
barShape.absarc(0, 0, barInner, 2*Math.PI, Math.PI, true);
barShape.lineTo(-barOuter, 0);
const barGeo = new THREE.ExtrudeGeometry(barShape, { depth: barHeight, bevelEnabled: false });
const bar = new THREE.Mesh(barGeo, MAT.woodDark);
bar.rotation.x = -Math.PI/2;
bar.castShadow = true;
bar.receiveShadow = true;
barGroup.add(bar);

// Bar TOP — copper-tinted marble
const barTopGeo = new THREE.ExtrudeGeometry(barShape, { depth: 0.04, bevelEnabled: false });
const barTop = new THREE.Mesh(barTopGeo, MAT.marble);
barTop.rotation.x = -Math.PI/2;
barTop.position.y = barHeight;
barGroup.add(barTop);

// Bar UNDER-EDGE LED (LED strip along outer front of bar) — bright copper line
const barLedShape = new THREE.Shape();
barLedShape.absarc(0, 0, barOuter + 0.02, Math.PI, 2*Math.PI, false);
barLedShape.lineTo(barOuter, 0);
barLedShape.absarc(0, 0, barOuter, 2*Math.PI, Math.PI, true);
barLedShape.lineTo(-(barOuter + 0.02), 0);
const barLedGeo = new THREE.ExtrudeGeometry(barLedShape, { depth: 0.02, bevelEnabled: false });
const barLed = new THREE.Mesh(barLedGeo, new THREE.MeshBasicMaterial({
  color: 0xC89B6C, transparent: true, opacity: 0.8,
}));
barLed.rotation.x = -Math.PI/2;
barLed.position.y = 0.5;
barGroup.add(barLed);

// BOTTLE SHELVES on the back wall behind the bar — curved row of bottles
const bottleGroup = new THREE.Group();
for (let i = 0; i < 60; i++) {
  const angle = Math.PI + (i / 59) * Math.PI;
  const r = 4.5;
  const x = Math.cos(angle) * r;
  const z = Math.sin(angle) * r;
  if (z < 0) continue;
  const h = 0.22 + Math.random() * 0.12;
  const w = 0.05 + Math.random() * 0.025;
  const bottleMat = (i % 3 === 0) ? MAT.glassAmber :
                    (i % 3 === 1) ? MAT.glassClear :
                    new THREE.MeshStandardMaterial({
                      color: 0x4a3a26, roughness: 0.15, metalness: 0.2,
                      transparent: true, opacity: 0.78,
                      emissive: 0x2a2010, emissiveIntensity: 0.5,
                    });
  const b = new THREE.Mesh(new THREE.CylinderGeometry(w, w * 1.1, h, 10), bottleMat);
  b.position.set(x, 1.5 + Math.random() * 0.5, z);
  b.castShadow = false;
  bottleGroup.add(b);
}
// also row 2
for (let i = 0; i < 50; i++) {
  const angle = Math.PI + (i / 49) * Math.PI;
  const r = 4.6;
  const x = Math.cos(angle) * r;
  const z = Math.sin(angle) * r;
  if (z < 0) continue;
  const h = 0.18 + Math.random() * 0.08;
  const w = 0.045 + Math.random() * 0.02;
  const b = new THREE.Mesh(new THREE.CylinderGeometry(w, w * 1.05, h, 8),
    new THREE.MeshStandardMaterial({
      color: 0x5a3a20, roughness: 0.2, metalness: 0.15,
      transparent: true, opacity: 0.7,
      emissive: 0x2a1808, emissiveIntensity: 0.45,
    }));
  b.position.set(x, 2.05 + Math.random() * 0.3, z);
  bottleGroup.add(b);
}
barGroup.add(bottleGroup);

// Bottle shelf back-light strips (warm uplight)
const bottleShelfLight1 = new THREE.PointLight(0xffaa66, 1.2, 7, 1.8);
bottleShelfLight1.position.set(-2.5, 1.6, 0.6);
barGroup.add(bottleShelfLight1);
const bottleShelfLight2 = new THREE.PointLight(0xffaa66, 1.2, 7, 1.8);
bottleShelfLight2.position.set(2.5, 1.6, 0.6);
barGroup.add(bottleShelfLight2);
const bottleShelfLight3 = new THREE.PointLight(0xffaa66, 1.0, 6, 1.8);
bottleShelfLight3.position.set(0, 1.6, 1.0);
barGroup.add(bottleShelfLight3);

// Bar working area: small tools on the bar top
function addBarTool(x, z, h, w, mat) {
  const tool = new THREE.Mesh(new THREE.CylinderGeometry(w, w, h, 10), mat);
  tool.position.set(x, barHeight + h/2, z);
  tool.castShadow = true;
  barGroup.add(tool);
}
addBarTool(-1.5, -2.5, 0.25, 0.06, MAT.copper);  // shaker
addBarTool(-0.8, -2.7, 0.18, 0.07, MAT.copper);  // jigger
addBarTool(0.0, -2.6, 0.12, 0.08, MAT.copper);   // muddler base
addBarTool(0.8, -2.7, 0.22, 0.05, MAT.copper);   // stirrer
addBarTool(1.6, -2.5, 0.20, 0.07, MAT.copper);   // ice bucket

// =================================================================
// BACK-OF-HOUSE — back kitchen + back door (top-right area, behind bar)
// =================================================================
// Partition wall separating BOH from main room (along z = 11.2, x = 2.5 to 4.5)
const bohWall = new THREE.Mesh(new THREE.BoxGeometry(1.5, H, 0.1), MAT.wallDark);
bohWall.position.set(3.7, H/2, 11.2);
scene.add(bohWall);
const bohWall2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, H, 2.0), MAT.wallDark);
bohWall2.position.set(2.95, H/2, 11.5);
scene.add(bohWall2);

// =================================================================
// WINE CELLAR — long vertical glowing case on the left wall
// =================================================================
const cellarGroup = new THREE.Group();
cellarGroup.position.set(-W/2 + 0.2, 0, 6);
scene.add(cellarGroup);

// Cellar case body — tall narrow box
const cellarBox = new THREE.Mesh(
  new THREE.BoxGeometry(0.35, 2.0, 6.5),
  new THREE.MeshStandardMaterial({
    color: 0x1a0e0e, roughness: 0.4, metalness: 0.3,
    emissive: 0x2a1606, emissiveIntensity: 0.3,
  })
);
cellarBox.position.set(0, 1.05, 0);
cellarBox.castShadow = true;
cellarGroup.add(cellarBox);

// Cellar inner glow (emissive plane facing into room)
const cellarGlow = new THREE.Mesh(
  new THREE.PlaneGeometry(6.3, 1.6),
  new THREE.MeshBasicMaterial({
    color: 0x8a4818, transparent: true, opacity: 0.5,
  })
);
cellarGlow.position.set(0.18, 1.1, 0);
cellarGlow.rotation.y = Math.PI/2;
cellarGroup.add(cellarGlow);

// Many bottles in cellar — rows of cylinders behind glass
for (let row = 0; row < 4; row++) {
  for (let col = 0; col < 30; col++) {
    const z = -3.0 + col * 0.21 + (row % 2 === 0 ? 0 : 0.1);
    const y = 0.45 + row * 0.4;
    const bot = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.07, 0.28, 8),
      new THREE.MeshStandardMaterial({
        color: (row % 2 === 0) ? 0x4a2812 : 0x6b3a18,
        roughness: 0.2, metalness: 0.15,
        emissive: 0x4a2810, emissiveIntensity: 0.6,
      })
    );
    bot.position.set(0.13, y, z);
    bot.rotation.z = Math.PI/2;  // lay bottles on their sides
    bot.castShadow = false;
    cellarGroup.add(bot);
  }
}

// Wood frame around cellar
const cellarFrame = new THREE.Mesh(
  new THREE.BoxGeometry(0.05, 2.1, 6.6),
  MAT.woodDark
);
cellarFrame.position.set(0.18, 1.05, 0);
cellarGroup.add(cellarFrame);

// Cellar light source
const cellarLight = new THREE.PointLight(0xffaa66, 1.5, 8, 1.6);
cellarLight.position.set(0, 1.5, 0);
cellarGroup.add(cellarLight);
const cellarLight2 = new THREE.PointLight(0xffaa66, 1.2, 6, 1.8);
cellarLight2.position.set(0, 1.5, -2.5);
cellarGroup.add(cellarLight2);
const cellarLight3 = new THREE.PointLight(0xffaa66, 1.2, 6, 1.8);
cellarLight3.position.set(0, 1.5, 2.5);
cellarGroup.add(cellarLight3);

// =================================================================
// BATHROOM — enclosed corner room (bottom-right, x=2.5..4.5, z=0..1.8)
// =================================================================
const bathWall1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, H, 1.9), MAT.wallDark);
bathWall1.position.set(2.55, H/2, 0.95);
scene.add(bathWall1);
const bathWall2 = new THREE.Mesh(new THREE.BoxGeometry(2.05, H, 0.1), MAT.wallDark);
bathWall2.position.set(3.55, H/2, 1.85);
scene.add(bathWall2);
// vestibule divider (interior)
const bathDiv = new THREE.Mesh(new THREE.BoxGeometry(0.06, H * 0.85, 0.9), MAT.wallDark);

    new THREE.MeshStandardMaterial({ color: 0x0a0608, roughness: 0.9 }));

  const ringMid = new THREE.Mesh(
    new THREE.RingGeometry(0.085, 0.097, 24),
    MAT.copper

function placeCluster({ centerX, centerZ, rotation = 0, color = 0x6b3a26 }) {
  // chair offsets in local frame
  const half = 0.45;
  const c1 = new THREE.Vector3(-half, 0, 0);
  const c2 = new THREE.Vector3(+half, 0, 0);
  // rotate offsets
  const rotMat = new THREE.Matrix4().makeRotationY(rotation);
  c1.applyMatrix4(rotMat); c2.applyMatrix4(rotMat);
  scene.add(makeArmchair({
    rotation: rotation + Math.PI/2,
    position: [centerX + c1.x, 0, centerZ + c1.z],
    color,
  }));
  scene.add(makeArmchair({
    rotation: rotation - Math.PI/2,
    position: [centerX + c2.x, 0, centerZ + c2.z],
    color,
  }));
  // table in center
  scene.add(makeRoundTable({ position: [centerX, 0, centerZ], r: 0.3, h: 0.45 }));
  // lamp
  scene.add(makeLamp({ position: [centerX, 0.47, centerZ], height: 0.32 }));

const views = {
  topdown:  { type: 'ortho', size: 7.5, pos: [0, 18, D/2], look: [0, 0, D/2] },
  hero:     { type: 'pers', pos: [-4.0, 3.0, 0.5], look: [1.5, 0.5, 10] },
  entrance: { type: 'pers', pos: [-3.0, 1.55, 0.4], look: [0.5, 1.3, 10] },

  vip:      { type: 'pers', pos: [0, 1.3, 4.4], look: [0, 0.6, 2.5] },
  hall:     { type: 'pers', pos: [-3.5, 1.7, 4.0], look: [2.5, 0.8, 8.5] },
};
let currentView = 'topdown';

function setTopdownHidden(hidden) {
  scene.traverse(obj => {
    if (obj.userData && obj.userData.hideInTopdown) {
      obj.visible = !hidden;
    }
    if (obj.userData && obj.userData.studioLight) {
      if (obj.isDirectionalLight) obj.intensity = hidden ? 4.5 : 0;
      if (obj.isAmbientLight)     obj.intensity = hidden ? 2.2 : 0;
    }
  });
  renderer.toneMappingExposure = hidden ? 2.2 : 1.1;
  scene.fog = hidden ? null : new THREE.FogExp2(0x09060f, 0.038);
}

function applyView(name, instant = false) {
  const v = views[name];
  if (!v) return;
  currentView = name;
  if (v.type === 'ortho') {
    activeCam = orthoCam;
    controls.enabled = false;
    const a = window.innerWidth / window.innerHeight;
    // Camera looks straight down (forward = -y). With rotation.set(-π/2, 0, 0):
    //   world -x → screen LEFT  ✓  (wine cellar left, bathroom right)
    //   world -z → screen UP    ✗  (would put entrance on top)
    // We want bar (large z) at top, so flip the projection vertically.
    orthoCam.left = -v.size * a;
    orthoCam.right = v.size * a;
    orthoCam.top = -v.size;     // flipped
    orthoCam.bottom = v.size;   // flipped
    orthoCam.position.set(...v.pos);
    orthoCam.rotation.set(-Math.PI/2, 0, 0);
    orthoCam.updateProjectionMatrix();
    setTopdownHidden(true);
  } else {
    activeCam = persCam;
    controls.enabled = true;
    setTopdownHidden(false);
    if (instant) {
      persCam.position.set(...v.pos);
      controls.target.set(...v.look);
      controls.update();
    } else {
      const startPos = persCam.position.clone();
      const startLook = controls.target.clone();
      const endPos = new THREE.Vector3(...v.pos);
      const endLook = new THREE.Vector3(...v.look);
      const t0 = performance.now();
      const dur = 900;
      function step() {
        const t = Math.min(1, (performance.now() - t0) / dur);
        const e = t * t * (3 - 2 * t);
        persCam.position.lerpVectors(startPos, endPos, e);
        controls.target.lerpVectors(startLook, endLook, e);
        if (t < 1) requestAnimationFrame(step);
      }
      step();
    }
  }
  document.querySelectorAll('.views button').forEach(b => {
    b.classList.toggle('on', b.dataset.view === name);
  });
}

document.querySelectorAll('.views button').forEach(b => {
  b.addEventListener('click', () => applyView(b.dataset.view));
});

// Expose for headless capture
window.cam = {
  setView: applyView,
  setViewInstant(name) { applyView(name, true); },
};

applyView('topdown', true);

// =================================================================
// RESIZE + LOOP
// =================================================================
window.addEventListener('resize', () => {
  const a = window.innerWidth / window.innerHeight;
  persCam.aspect = a;
  persCam.updateProjectionMatrix();
  const v = views[currentView];
  if (v && v.type === 'ortho') {
    orthoCam.left = -v.size * a;
    orthoCam.right = v.size * a;
    orthoCam.updateProjectionMatrix();
  }
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  if (activeCam === persCam) controls.update();
  const t = clock.getElapsedTime();
  discGroup.rotation.y = t * 0.04;
  renderer.render(scene, activeCam);
}
animate();

// signal ready for headless capture
window.sceneReady = true;
</script>

</body>
</html>
